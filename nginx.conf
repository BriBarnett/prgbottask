server {
    listen 80;
    server_name prgbottask.com www.prgbottask.com;
    return 301 https://prgbottask.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name prgbottask.com;

    # SSL certificates (handled by Certbot or Caddy)
    ssl_certificate /etc/letsencrypt/live/prgbottask.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prgbottask.com/privkey.pem;

    root /var/www/prgbottask;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}