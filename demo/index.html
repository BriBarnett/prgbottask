<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try PrgBotTask — Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .chat-bubble { max-width: 75%; padding: 14px 20px; border-radius: 20px; margin-bottom: 12px; }
        .user-bubble { background: #FF6B00; color: white; border-bottom-right-radius: 4px; margin-left: auto; }
        .bot-bubble { background: #f1f5f9; color: #0f172a; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto pt-12 px-6">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-white/10 px-6 py-2 rounded-3xl mb-6">
                <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                <span class="font-medium">Live Demo — Text PrgBotTask</span>
            </div>
            <h1 class="heading-font text-5xl font-semibold tracking-tighter">Try it yourself</h1>
            <p class="mt-4 text-zinc-400">Type a message like you would from the job site. Watch PrgBotTask turn it into professional outputs.</p>
        </div>

        <div id="chat" class="bg-zinc-900 rounded-3xl p-6 h-[420px] overflow-y-auto mb-6 border border-zinc-800">
            <!-- Messages added by JS -->
        </div>

        <div class="flex gap-3">
            <input id="input" type="text" placeholder="Just finished the PM at 142 Maple. Delta T 19°. New filter installed..." 
                   class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 text-white placeholder-zinc-500 focus:outline-none">
            <button onclick="sendMessage()" 
                    class="bg-orange-500 hover:bg-orange-600 px-8 rounded-3xl font-semibold">Send</button>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-8">
            This is a simulation. In the real product you simply text the number "PrgBotTask".
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${isUser ? 'user-bubble' : 'bot-bubble'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';

            // Simulate thinking
            setTimeout(() => {
                let response = "Understood. Generating professional invoice, maintenance report with Delta T summary, and 6-month follow-up sequence...";
                
                if (text.toLowerCase().includes("delta") || text.toLowerCase().includes("superheat")) {
                    response = "Delta T recorded at 19°. Superheat 12°, Subcooling 9°. System running optimally. Report, invoice, and customer summary generated. Follow-up scheduled.";
                } else if (text.toLowerCase().includes("invoice") || text.toLowerCase().includes("bill")) {
                    response = "Invoice created and ready to send. Total: $487. Customer copy sent via text. Payment link included.";
                }
                
                addMessage(response, false);
            }, 900);
        }

        // Demo starter messages
        setTimeout(() => {
            addMessage("Just finished the PM at 142 Maple. New filter installed. Delta T 19°. Customer happy.", false);
        }, 600);

        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
